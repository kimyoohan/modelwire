    <main class="changelog">
      <div class="summary" id="changelog-summary">Loading...</div>
      <div id="releases"></div>
    </main>

    <script>
      (function () {
        const summary = document.querySelector("#changelog-summary");
        const releasesEl = document.querySelector("#releases");

        function fmtValue(value, field) {
          if (value === null || value === undefined) {
            return "-";
          }
          if (field && field.startsWith("pricing.")) {
            return `$${Number(value).toFixed(2)}`;
          }
          if (typeof value === "number") {
            return Number(value).toLocaleString();
          }
          if (Array.isArray(value)) {
            return value.join("+");
          }
          return String(value);
        }

        function lineFor(entry) {
          const model = `${entry.provider}/${entry.model_id}`;
          if (entry.type === "added") {
            return `${model} added`;
          }
          if (entry.type === "removed") {
            return `${model} removed`;
          }
          return `${model} ${entry.field} ${fmtValue(entry.old, entry.field)} -> ${fmtValue(entry.new, entry.field)}`;
        }

        function render(changelog) {
          const releases = (changelog.releases || []).slice().sort((a, b) => b.date.localeCompare(a.date));
          summary.textContent = `${releases.length} release${releases.length === 1 ? "" : "s"}`;
          releasesEl.textContent = "";

          const fragment = document.createDocumentFragment();
          for (const release of releases) {
            const section = document.createElement("section");
            section.className = "release";

            const heading = document.createElement("h2");
            heading.textContent = `${release.date} v${release.version}`;
            section.appendChild(heading);

            const releaseSummary = document.createElement("p");
            releaseSummary.className = "release-summary";
            releaseSummary.textContent = release.summary;
            section.appendChild(releaseSummary);

            const list = document.createElement("ul");
            list.className = "changes";
            for (const entry of release.entries || []) {
              const item = document.createElement("li");
              item.textContent = lineFor(entry);
              list.appendChild(item);
            }
            section.appendChild(list);
            fragment.appendChild(section);
          }
          releasesEl.appendChild(fragment);
        }

        async function loadChangelog() {
          if (window.location.protocol === "file:") {
            return loadInlineChangelog();
          }

          try {
            const response = await fetch("changelog.json", { cache: "no-store" });
            if (!response.ok) {
              throw new Error(`changelog.json returned ${response.status}`);
            }
            return await response.json();
          } catch (error) {
            return loadInlineChangelog(error);
          }
        }

        function loadInlineChangelog(error) {
          const fallback = document.querySelector("#modelwire-changelog");
          if (!fallback || !fallback.textContent.trim()) {
            throw error || new Error("No embedded changelog fallback found");
          }
          return JSON.parse(fallback.textContent);
        }

        async function init() {
          try {
            render(await loadChangelog());
          } catch (error) {
            summary.textContent = "Unable to load changelog";
            releasesEl.textContent = error.message;
          }
        }

        init();
      })();
    </script>
